<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="d-flex">

    <!-- SIDEBAR -->
    <div class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark vh-100" style="width: 280px;">

      <a id="navDashboard" href="#" class="d-flex align-items-center mb-3 text-white text-decoration-none">
        <span class="fs-4">Dashboard</span>
      </a>

      <hr>

      <ul class="nav nav-pills flex-column mb-auto">


        <li>
          <a href="#" class="nav-link text-white" id="navProjects">Projects</a>
        </li>

        <li>
          <a href="#" class="nav-link text-white" id="navTasks">Tasks</a>
        </li>

        <li>
          <a href="#" class="nav-link text-white" id="navRoles">Roles</a>
        </li>

        <li>
          <a href="#" class="nav-link text-white" id="navUsers">Users</a>
        </li>

      </ul>

      <hr>

      <!-- USER -->
      <div class="dropdown">

        <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
          data-bs-toggle="dropdown">

          <strong id="sidebarUser">Usuario</strong>
        </a>

        <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
          <li>
            <a id="navProfile" class="dropdown-item" href="#">Profile</a>
          </li>
          <li><a class="dropdown-item" href="#" id="logoutBtn">Logout</a></li>
        </ul>

      </div>

    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="flex-grow-1 p-4 vh-100 overflow-auto">
      <div id="appContent"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/dashboard.js"></script>

</body>

</html>
